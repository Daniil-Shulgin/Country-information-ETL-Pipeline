version: '3.8'

services:
  db:
    image: postgres:15
    container_name: countries_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: countries_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "countries_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: